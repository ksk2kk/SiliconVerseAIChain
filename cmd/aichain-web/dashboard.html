<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Chain Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
header{background:#111118;border-bottom:1px solid #1e1e2e;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:12px}
h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status-line{display:flex;align-items:center;gap:16px;font-size:12px;color:#a0a0b0;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
main{max-width:1400px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.card{background:#111118;border:1px solid #1e1e2e;border-radius:12px;padding:16px}
.card .label{font-size:10px;color:#71717a;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.card .value{font-size:22px;font-weight:700;color:#f0f0f0}
.card .sub{font-size:11px;color:#6366f1;margin-top:2px}
.identity-box{background:#111118;border:1px solid #6366f1;border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.identity-box .id-label{font-size:10px;color:#71717a;text-transform:uppercase;letter-spacing:1px}
.identity-box .id-value{font-size:14px;font-family:monospace;color:#6366f1;font-weight:600;margin-top:2px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:900px){.row{grid-template-columns:1fr}}
.section h2{font-size:13px;font-weight:600;color:#a0a0b0;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;font-size:10px;color:#71717a;text-transform:uppercase;border-bottom:1px solid #1e1e2e}
td{padding:7px 12px;font-size:12px;border-bottom:1px solid #111118}
tr:hover td{background:rgba(99,102,241,.04)}
.badge{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;white-space:nowrap}
.b-Pending,.b-pending{background:rgba(250,204,21,.15);color:#facc15}
.b-Analyzing{background:rgba(168,85,247,.15);color:#a855f7}
.b-Mining,.b-Running,.b-running{background:rgba(59,130,246,.15);color:#3b82f6}
.b-Completed,.b-completed{background:rgba(34,197,94,.15);color:#22c55e}
.b-Failed,.b-failed{background:rgba(239,68,68,.15);color:#ef4444}
.b-Aggregating{background:rgba(236,72,153,.15);color:#ec4899}
input,select,textarea{width:100%;padding:10px 12px;background:#0a0a0f;border:1px solid #1e1e2e;border-radius:8px;color:#e0e0e0;font-size:13px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#6366f1}
textarea{resize:vertical;min-height:60px}
button{padding:9px 20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
button:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.4)}
button:disabled{opacity:.5;cursor:not-allowed;transform:none}
button.small{padding:4px 12px;font-size:11px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:#a0a0b0;margin-bottom:4px}
.result-box{margin-top:10px;padding:12px;background:#0a0a0f;border:1px solid #22c55e;border-radius:8px;font-size:12px;line-height:1.5;white-space:pre-wrap;display:none;max-height:200px;overflow-y:auto}
.result-box.show{display:block}
.hw-info{display:flex;gap:24px;flex-wrap:wrap}
.hw-item{text-align:center}
.hw-item .hw-val{font-size:20px;font-weight:700;color:#f0f0f0}
.hw-item .hw-lbl{font-size:10px;color:#71717a;margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:12px;background:#111118;border-radius:10px;padding:4px}
.tab{padding:7px 14px;border-radius:8px;font-size:12px;color:#71717a;cursor:pointer;transition:all .2s}
.tab.active{background:#6366f1;color:#fff}
.subtask-row{padding:4px 0 4px 20px;font-size:11px;border-left:2px solid #6366f1;margin:4px 0}
.pipeline{display:flex;gap:4px;align-items:center;margin-top:4px}
.pipe-step{padding:2px 8px;border-radius:6px;font-size:9px;font-weight:600}
.pipe-active{background:rgba(99,102,241,.3);color:#a5b4fc}
.pipe-done{background:rgba(34,197,94,.2);color:#86efac}
.pipe-wait{background:rgba(30,30,46,1);color:#52525b}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:8px;font-weight:600;font-size:13px;z-index:200;transform:translateY(100px);opacity:0;transition:all .3s;background:#22c55e;color:#000}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:#ef4444;color:#fff}
</style>
</head>
<body>
<header>
<h1>AI Chain</h1>
<div class="status-line">
<span><span class="dot"></span> <span id="miner-name">--</span></span>
<span>ID: <span id="miner-id">--</span></span>
<span>Height: <span id="chain-h">0</span></span>
<span>Uptime: <span id="uptime">--</span></span>
</div>
</header>
<main>

<div class="identity-box">
<div>
<div class="id-label">Your Identity (local keypair)</div>
<div class="id-value" id="user-id">Generating...</div>
</div>
<div>
<button class="small" onclick="regenerateIdentity()">New Identity</button>
</div>
</div>

<div class="section"><h2>Node Hardware</h2>
<div class="hw-info" id="hw-info"></div>
</div>

<div class="grid" id="stats-grid"></div>

<div class="row">
<div>
<div class="section"><h2>Publish Task</h2>
<div class="card">
<div class="form-group"><label>Model</label><select id="task-model"></select></div>
<div class="form-group"><label>Prompt (complex prompts are auto-split)</label><textarea id="task-prompt" placeholder="Example: Explain blockchain consensus and compare PoW vs PoS. Also discuss energy implications."></textarea></div>
<div class="form-group"><label>Fee (APT)</label><input id="task-fee" value="0.05"></div>
<button onclick="publishTask()" id="pub-btn">Publish Task</button>
<div class="result-box" id="pub-result"></div>
</div>
</div>
</div>
<div>
<div class="section"><h2>Pipeline Monitor</h2>
<div class="card">
<div id="pipeline-status">
<p style="font-size:12px;color:#71717a">Waiting for tasks...</p>
</div>
<div id="subtask-progress"></div>
</div>
</div>
<div class="section"><h2>Live AI Output</h2>
<div class="card">
<div id="live-output" style="font-family:monospace;font-size:12px;line-height:1.5;max-height:400px;overflow-y:auto;white-space:pre-wrap;color:#a0a0b0;min-height:100px">Waiting for mining to start...</div>
</div>
</div>
</div>

<div class="section"><h2>
<span style="float:right">
<span class="tabs" style="display:inline-flex;margin:0">
<span class="tab active" onclick="switchView('all')">All Tasks</span>
<span class="tab" onclick="switchView('mine')">My Tasks</span>
</span>
</span>
Tasks
</h2>
<div id="task-table"></div></div>

<div class="section"><h2>Blocks</h2>
<div id="blocks-table"></div></div>

</main>
<div id="task-detail-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:500;overflow-y:auto">
<div style="max-width:1000px;margin:40px auto;background:#111118;border:1px solid #6366f1;border-radius:12px;padding:24px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<h2 style="color:#f0f0f0;margin:0" id="modal-title">Task Detail</h2>
<button onclick="closeDetail()" style="background:#1e1e2e">Close</button>
</div>
<div id="modal-body"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- User Identity ----
function getUserID(){
  var id=localStorage.getItem('aichain_user_id');
  if(!id){
    var arr=new Uint8Array(20);crypto.getRandomValues(arr);
    id=Array.from(arr).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
    localStorage.setItem('aichain_user_id','0x'+id);
  }
  return localStorage.getItem('aichain_user_id');
}
document.getElementById('user-id').textContent=getUserID();

function regenerateIdentity(){
  localStorage.removeItem('aichain_user_id');
  document.getElementById('user-id').textContent=getUserID();
  load();
}

var currentView='all';
function switchView(v){currentView=v;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});event.target.classList.add('active');load()}

// ---- API ----
var API='';
async function get(u){var r=await fetch(API+u);return r.json()}

async function load(){
  var node,blocks,tasks;
  try{
    var results=await Promise.all([get('/api/node'),get('/api/blocks'),get('/api/tasks')]);
    node=results[0];blocks=results[1];tasks=results[2];
  }catch(e){return}

  document.getElementById('miner-name').textContent=node.miner_name;
  document.getElementById('miner-id').textContent=node.peer_id;
  document.getElementById('chain-h').textContent=node.height;
  document.getElementById('uptime').textContent=node.uptime+' uptime';

  document.getElementById('hw-info').innerHTML=
    '<div class="hw-item"><div class="hw-val">'+node.gpu+'</div><div class="hw-lbl">GPU</div></div>'+
    '<div class="hw-item"><div class="hw-val">'+(node.vram_mb/1024).toFixed(0)+' GB</div><div class="hw-lbl">VRAM</div></div>'+
    '<div class="hw-item"><div class="hw-val">'+(node.ram_mb/1024).toFixed(0)+' GB</div><div class="hw-lbl">RAM</div></div>'+
    '<div class="hw-item"><div class="hw-val">'+node.models.length+'</div><div class="hw-lbl">Models</div></div>';

  document.getElementById('stats-grid').innerHTML=
    '<div class="card"><div class="label">Chain Height</div><div class="value">#'+node.height+'</div></div>'+
    '<div class="card"><div class="label">Task Pool</div><div class="value">'+node.task_pool+'</div><div class="sub">'+node.subtask_pool+' subtasks</div></div>'+
    '<div class="card"><div class="label">Mempool</div><div class="value">'+node.mempool+' tx</div></div>'+
    '<div class="card"><div class="label">Miner</div><div class="value" style="font-size:12px;font-family:monospace">'+node.miner_addr.slice(0,14)+'...</div></div>';

  var sel=document.getElementById('task-model');
  if(node.models.length>0&&sel.options.length===0){
    node.models.forEach(function(m){var o=document.createElement('option');o.value=m;o.text=m;sel.add(o)});
  }

  var bh='<table><tr><th>Height</th><th>Hash</th><th>Txs</th><th>Time</th></tr>';
  blocks.slice().reverse().forEach(function(b){bh+='<tr><td>#'+b.height+'</td><td style="font-family:monospace">'+b.hash.slice(0,20)+'...</td><td>'+b.txs+'</td><td>'+b.time+'</td></tr>'});
  bh+='</table>';document.getElementById('blocks-table').innerHTML=bh;

  var uid=getUserID();
  allTasksCache=tasks;
  var displayTasks=currentView==='mine'?tasks.filter(function(t){return t.creator===uid}):tasks;

  var th='<table><tr><th>Task ID</th><th>Creator</th><th>Model</th><th>Prompt</th><th>Pipeline</th><th>Status</th><th></th></tr>';
  displayTasks.forEach(function(t){
    var st=t.status.toLowerCase();
    var pipeline='';
    if(t.subtasks&&t.subtasks.length>0){
      pipeline='<div class="pipeline">';
      pipeline+='<span class="pipe-step pipe-done">Split</span>';
      t.subtasks.forEach(function(s){
        var cls=s.status==='Completed'?'pipe-done':s.status==='Running'?'pipe-active':'pipe-wait';
        pipeline+='<span class="pipe-step '+cls+'">Step'+(s.index+1)+'</span>';
      });
      if(t.status==='Completed')pipeline+='<span class="pipe-step pipe-done">Done</span>';
      pipeline+='</div>';
    }else{
      pipeline='<div class="pipeline"><span class="pipe-step '+ (t.status==='Analyzing'?'pipe-active':t.status==='Pending'?'pipe-wait':'pipe-done') +'">Analyze</span><span class="pipe-step pipe-wait">Mine</span><span class="pipe-step pipe-wait">Done</span></div>';
    }
    var creator=t.creator===uid?'<span style="color:#6366f1">You</span>':t.creator.slice(0,10)+'...';
    th+='<tr><td style="font-family:monospace;font-size:10px">'+t.id.slice(0,14)+'</td><td>'+creator+'</td><td style="font-size:11px">'+t.model+'</td><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">'+t.prompt.slice(0,50)+'</td><td>'+pipeline+'</td><td><span class="badge b-'+st+'">'+t.status+'</span></td><td><button class="small" onclick="event.stopPropagation();viewTask(\''+t.id+'\')">View</button></td></tr>';

  });
  th+='</table>';document.getElementById('task-table').innerHTML=th;

  // Pipeline status
  var mining=tasks.filter(function(t){return t.status==='Analyzing'||t.status==='Mining'});
  var pending=tasks.filter(function(t){return t.status==='Pending'});
  if(mining.length>0){
    document.getElementById('pipeline-status').innerHTML='<span style="color:#facc15">'+mining.length+' tasks in pipeline</span>';
  }else if(pending.length>0){
    document.getElementById('pipeline-status').innerHTML='<span style="color:#6366f1">'+pending.length+' tasks queued</span>';
  }else{
    document.getElementById('pipeline-status').innerHTML='<span style="color:#22c55e">Idle — publish a task</span>';
  }
}

async function publishTask(){
  var btn=document.getElementById('pub-btn');
  var prompt=document.getElementById('task-prompt').value;
  if(!prompt){showToast('Please enter a prompt','err');return}
  btn.disabled=true;btn.textContent='Publishing...';
  var r=await fetch(API+'/api/tasks/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:document.getElementById('task-model').value,tier:'Conversation',fee:document.getElementById('task-fee').value,prompt:prompt,creator:getUserID()})});
  var d=await r.json();
  btn.disabled=false;btn.textContent='Publish Task';
  if(d.error){showToast(d.error,'err');return}
  document.getElementById('task-prompt').value='';
  showToast('Task published! Pipeline will split & mine it.');
  load();
}

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(type==='err'?' err':'')+' show';
  setTimeout(function(){t.className='toast'},3000);
}

var allTasksCache=[];
function viewTask(taskId){
  var t=allTasksCache.find(function(t){return t.id===taskId});
  if(!t)return;
  var h='';
  h+='<div class="card" style="margin-bottom:16px">';
  h+='<div class="label">Task ID</div><div style="font-family:monospace;font-size:14px;color:#6366f1">'+t.id+'</div>';
  h+='<div style="margin-top:12px"><span class="label">Creator</span> '+t.creator+'</div>';
  h+='<div><span class="label">Model</span> '+t.model+'</div>';
  h+='<div><span class="label">Fee</span> '+t.fee+'</div>';
  h+='<div><span class="label">Status</span> <span class="badge b-'+t.status.toLowerCase()+'">'+t.status+'</span></div>';
  h+='<div style="margin-top:12px"><span class="label">Prompt</span></div>';
  h+='<div style="background:#0a0a0f;padding:14px;border-radius:8px;margin-top:4px;font-size:14px;line-height:1.6">'+escapeHtml(t.prompt)+'</div>';
  h+='</div>';

  if(t.subtasks&&t.subtasks.length>0){
    h+='<h3 style="color:#a0a0b0;margin:16px 0 8px">Pipeline Subtasks ('+t.subtasks.length+')</h3>';
    t.subtasks.forEach(function(s){
      var sts=s.status.toLowerCase();
      h+='<div class="card" style="margin-bottom:12px;border-left:3px solid '+ (s.status==='Completed'?'#22c55e':s.status==='Running'?'#3b82f6':'#facc15') +'">';
      h+='<div><span class="badge b-'+sts+'">'+s.status+'</span> <strong>Step '+(s.index+1)+'</strong></div>';
      h+='<div style="margin-top:8px;font-size:13px;color:#a0a0b0">'+escapeHtml(s.prompt)+'</div>';
      if(s.result){
        h+='<div style="margin-top:12px;background:#0a0a0f;padding:16px;border-radius:8px;font-size:13px;line-height:1.6;white-space:pre-wrap;max-height:600px;overflow-y:auto">'+escapeHtml(s.result)+'</div>';
      }
      h+='</div>';
    });
  }

  if(t.result&&t.status==='Completed'){
    h+='<h3 style="color:#22c55e;margin:16px 0 8px">Aggregated Result</h3>';
    h+='<div class="card" style="background:#0a0a0f;font-size:13px;line-height:1.6;white-space:pre-wrap;max-height:600px;overflow-y:auto">'+escapeHtml(t.result)+'</div>';
  }

  document.getElementById('modal-title').textContent='Task '+t.id.slice(0,16);
  document.getElementById('modal-body').innerHTML=h;
  document.getElementById('task-detail-modal').style.display='block';
}
function closeDetail(){document.getElementById('task-detail-modal').style.display='none'}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

var evtSource=new EventSource('/ws');
evtSource.onmessage=function(e){if(!e.data.startsWith(':'))load()};
load();
setInterval(load,5000);

// Live AI output stream
var liveStream=new EventSource('/api/stream/current');
var liveEl=document.getElementById('live-output');
var liveBuffer='';
liveStream.onmessage=function(e){
  if(e.data.startsWith(':'))return;
  liveBuffer+=e.data;
  liveEl.textContent=liveBuffer;
  liveEl.scrollTop=liveEl.scrollHeight;
};
liveStream.onerror=function(){liveStream.close();setTimeout(function(){liveStream=new EventSource('/api/stream/current');},2000)};
</script>
</body>
</html>
